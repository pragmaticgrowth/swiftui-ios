# gate-02 (structural): an `if #available(macOS …)` block whose body uses an iOS-floored API, inside an
# iOS target = wrong availability arm (hard-fail). The grep tell catches the bare `#available(macOS NN`
# string; this structural form proves the GATE SCOPE actually wraps a floored symbol (not just that the
# string appears somewhere). On iPhone/iPad the macOS arm is never true, so the iOS floor is never
# enforced — the call ships unguarded (or fails to compile) on device.
# Gate on #available(iOS NN, *). fix_mode: auto (arm swap only). READ to confirm the body symbol.
# NOTE the inversion vs a macOS audit: there the wrong arm is `iOS`; in an iOS target it is `macOS`.
id: gate-02-macos-arm-gates-ios-api
language: Swift
severity: error
message: >-
  gate-02: an `if #available(macOS …)` block guards an iOS-floored API in an iOS target (wrong arm; the
  macOS arm never enforces the iOS floor on device). Gate on #available(iOS NN, *). fix_mode: auto.
rule:
  kind: if_statement
  all:
    - has:
        field: condition
        kind: availability_condition
        regex: 'macOS'
    - has:
        stopBy: end
        regex: 'glassEffect|GlassEffectContainer|buttonStyle\(\.glass|scrollEdgeEffect|backgroundExtensionEffect|navigationSubtitle|tabBarMinimizeBehavior|MeshGradient|onScrollGeometryChange'
