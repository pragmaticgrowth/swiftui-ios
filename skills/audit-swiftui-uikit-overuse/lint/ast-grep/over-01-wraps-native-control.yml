# over-01 (structural): a `makeUIView(context:)` function whose body CONSTRUCTS a 1:1-native UIKit
# control (UILabel/UIButton/UISwitch/UISlider/…). The grep tell only proves the class name appears
# somewhere in the file; this rule proves it is actually the thing the representable builds — i.e. the
# bridge wraps a control that has a native SwiftUI equal (over-01 overuse), not that the name is
# mentioned in a comment or a justified custom subclass. Anchored on the function_declaration kind. READ
# the file to apply the WHETHER test (a custom first-responder/inputAccessoryView UITextField subclass
# is a justified hatch, not over-01).
id: over-01-makeuiview-builds-native-control
language: Swift
severity: warning
message: >-
  over-01: makeUIView constructs a 1:1-native UIKit control (UILabel/UIButton/UISwitch/UISlider/UIStepper/
  UIDatePicker/UIProgressView/UISegmentedControl/UIPickerView/UIImageView). A native SwiftUI control
  (Text/Button/Toggle/Slider/Stepper/DatePicker/ProgressView/Picker/Image) likely fits.
  flag-only. READ and apply the WHETHER test before reporting (a custom focus/inputAccessoryView hatch is justified).
rule:
  kind: function_declaration
  all:
    - has:
        field: name
        regex: '^makeUIView$'
    - has:
        stopBy: end
        regex: 'UI(Label|Button|Switch|Slider|Stepper|DatePicker|ProgressView|SegmentedControl|PickerView|ImageView)\('
