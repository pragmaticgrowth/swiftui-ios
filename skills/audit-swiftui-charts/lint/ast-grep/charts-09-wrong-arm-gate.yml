# charts-09 (structural): an `#available(macOS ...)` gate whose body CONTAINS a Charts symbol, inside an
# iOS target. The macOS arm never runs on iPhone/iPad -> the chart is unreachable / the floor is wrong.
# grep can find `#available(macOS` and `BarMark` separately but CANNOT prove the mark is scoped by that
# gate. This is gate-scope containment -- the canonical tier-2 rule. Fix: gate on #available(iOS N, *) with
# the real floor (Charts iOS 16; SectorMark/selection/scroll iOS 17; LinePlot/AreaPlot iOS 18).
id: charts-09-wrong-arm-gate
language: Swift
severity: hard
message: >-
  charts-09: an #available(macOS ...) gate scopes a Charts symbol in an iOS target (wrong arm). Gate on
  #available(iOS N, *) with the floor from floors-master (fix_mode: auto).
rule:
  pattern: if #available(macOS $V, *) { $$$BODY }
  has:
    any:
      - pattern: Chart($$$C)
      - pattern: BarMark($$$B)
      - pattern: LineMark($$$L)
      - pattern: SectorMark($$$S)
      - pattern: PointMark($$$P)
    stopBy: end
