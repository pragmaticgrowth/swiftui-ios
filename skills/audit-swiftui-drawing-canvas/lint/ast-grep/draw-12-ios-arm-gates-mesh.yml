# draw-12 (structural): an `if #available(macOS …)` block whose body uses MeshGradient, inside an iOS
# target = wrong availability arm (hard-fail). The grep tell catches the bare `#available(macOS 18` string;
# this structural form proves the GATE SCOPE actually wraps MeshGradient (not just that the string
# appears). Gate on #available(iOS 18, *). fix_mode: auto.
id: draw-12-macos-arm-gates-mesh
language: Swift
severity: error
message: >-
  draw-12: an `if #available(macOS …)` block guards MeshGradient in an iOS target (wrong availability arm).
  Gate on #available(iOS 18, *). fix_mode: auto. READ to confirm the body uses MeshGradient.
rule:
  kind: if_statement
  all:
    - has:
        field: condition
        kind: availability_condition
        regex: 'macOS'
    - has:
        stopBy: end
        regex: 'MeshGradient'
