# draw-05 (structural): a MeshGradient(...) call that is NOT inside an `if #available(...)` availability
# gate. MeshGradient is iOS 18.0+; under a deployment target < iOS 18 it must be gated. grep CANNOT
# prove the ABSENCE of an enclosing gate — it only sees the `MeshGradient(` line; this anchors on the
# call_expression and asserts no enclosing if_statement carries an availability_condition. READ the
# deployment floor in ORIENT: floor >= 18 → fine; floor < 18 with this firing → hard-fail (draw-05).
id: draw-05-meshgradient-not-gated
language: Swift
severity: warning
message: >-
  draw-05: a MeshGradient(...) call is NOT inside an if #available(...) availability gate. MeshGradient is
  iOS 18.0+; under a deployment target < iOS 18 it must be gated on #available(iOS 18, *). READ the
  deployment floor (ORIENT) — if the floor is >= 18 this is fine; below 18 it is a hard-fail.
rule:
  kind: call_expression
  all:
    - pattern: MeshGradient($$$ARGS)
    - not:
        inside:
          kind: if_statement
          stopBy: end
          has:
            field: condition
            kind: availability_condition
