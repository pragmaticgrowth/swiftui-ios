name: release
# On a version tag, build a universal macOS `swiftui-ctx` and attach it to the GitHub Release.
# The bundled wrapper (scripts/swiftui-ctx) downloads this asset on first run — so plugin users need no toolchain.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable          # Swift 6 toolchain (runner default is older)
      - name: Build universal binary (arm64 + x86_64)
        run: |
          cd swiftui-scan
          swift build -c release --product swiftui-ctx --arch arm64 --arch x86_64
          cp .build/apple/Products/Release/swiftui-ctx "$GITHUB_WORKSPACE/swiftui-ctx"
          file "$GITHUB_WORKSPACE/swiftui-ctx"
      - name: Verify it runs (version + doctor + subcommand smokes)
        run: |
          set -euo pipefail
          chmod +x swiftui-ctx
          export SWIFTUI_CTX_CATALOG="$GITHUB_WORKSPACE/catalog"
          ./swiftui-ctx --version
          ok() { echo "smoke: $*"; ./swiftui-ctx "$@" --json | python3 -c 'import sys,json; assert json.load(sys.stdin)["ok"], "ok:false"'; }
          ok doctor
          ok lookup MenuBarExtra
          ok deprecated
          ok search drag
          ok recipe menubar-app
          ok conformances View
          ok valueBuilders ease
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: swiftui-ctx
          fail_on_unmatched_files: true
          generate_release_notes: true
